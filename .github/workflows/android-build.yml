name: Android CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup Signing Keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # 在 CI 环境现场生成 keystore
          keytool -genkeypair \
            -v \
            -keystore napkin-release.keystore \
            -alias napkin \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9125 \
            -storepass Napkin2026! \
            -keypass Napkin2026! \
            -dname "CN=Napkin, OU=App, O=Napkin, L=Beijing, ST=Beijing, C=CN"

          # 验证 keystore 能被 keytool 读
          echo "=== 验证 keystore ==="
          keytool -list -keystore napkin-release.keystore -storepass 'Napkin2026!' || exit 1

          echo "KEYSTORE_PATH=$(pwd)/napkin-release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=Napkin2026!" >> $GITHUB_ENV
          echo "KEY_ALIAS=napkin" >> $GITHUB_ENV
          echo "KEY_PASSWORD=Napkin2026!" >> $GITHUB_ENV

          echo "=== 环境变量（不打印密码值）==="
          echo "KEYSTORE_PATH=$KEYSTORE_PATH"
          echo "KEY_ALIAS=$KEY_ALIAS"
          echo "KEYSTORE_PASSWORD length: ${#KEYSTORE_PASSWORD}"

      - name: Build Debug APK
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: imageflow-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Prepare Release Assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/debug/*.apk release-assets/imageflow-debug.apk
          cp app/build/outputs/apk/release/*.apk release-assets/imageflow-release.apk
          ls -la release-assets/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/imageflow-debug.apk
            release-assets/imageflow-release.apk
          body: |
            ## 下载说明
            - **imageflow-release.apk** — Release 版，已签名（Napkin2026! keystore），可直接安装 ⭐ 推荐
            - **imageflow-debug.apk** — Debug 版，自带调试签名，体积较大但带日志
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
